<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Assessment | TechPath Expert</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Force body layout same as assessment-1 and assessment-2 */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Form layout — fills remaining space, centers card */
        .container.form-layout {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 5% 4rem;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        /* Form card — same max-width as assessment-1 and 2 */
        .glass-card.form-container.wide {
            width: 100%;
            max-width: 800px;
            padding: 2.5rem;
            background: rgba(17, 24, 39, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 240, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Animated top border */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scanline 3s linear infinite;
            opacity: 0.8;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        /* Question cards */
        .question-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .question-card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.05);
            background: rgba(0, 240, 255, 0.02);
        }

        /* Radio buttons */
        .radio-custom {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .glass-card.form-container.wide { padding: 1.5rem; }
            .radio-custom { width: 35px; height: 35px; font-size: 0.9rem; }
            .question-card { padding: 1.1rem; }
            .question-text { font-size: .92rem; margin-bottom: .9rem; }
            .progress-text { font-size: .72rem; }
        }
        @media (max-width: 380px) {
            .container.form-layout { padding: 1.2rem 4% 3rem; }
            .glass-card.form-container.wide { padding: 1.1rem; }
            .question-card { padding: .9rem; }
            .question-text { font-size: .88rem; }
            .radio-custom { width: 30px; height: 30px; font-size: .78rem; }
            .rating-group { gap: 4px; }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div id="toastNotification" class="custom-toast">
        <div class="spinner"></div>
        <span>Data successfully saved! Running Inference Engine...</span>
    </div>

    <header class="header-container">
        <nav class="navbar">
            <div class="logo"><h1>Tech<span class="text-cyan">Path</span></h1></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="knowledge-base.html">Career List</a></li>
                <li><a href="about.html">About System</a></li>
                <li><a href="cgpa.html">CGPA Calculator</a></li>
            </ul>
        </nav>
    </header>

    <main class="container form-layout">
        <section class="glass-card form-container wide">
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 80%;"></div>
                </div>
                <p class="progress-text">Step 4 of 5: Personality Assessment</p>
            </div>

            <div class="form-header">
                <h2>Personality Assessment</h2>
                <p>Rate your personality tendencies and work style. <br>
                <span class="text-cyan">(1 = Strongly Disagree, 5 = Strongly Agree)</span></p>
            </div>

            <form id="personalityForm">
                <div class="questions-container" id="questionsContainer">
                    </div>

                <div class="form-actions mt-4">
                    <button type="submit" class="btn btn-primary btn-block">Run Inference Engine <span class="arrow">⚙️</span></button>
                </div>
            </form>
        </section>
    </main>

    <script src="script.js"></script>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = 'rgba(0, 240, 255, 0.5)';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let numberOfParticles = (canvas.width * canvas.height) / 15000;
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 240, 255, ${0.15 - distance/800})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        init();
        animateParticles();
    </script>

    <script>
        // Personality Question Data (15 Questions according to Expert System requirements)
        const personalityQuestions = [
            "I like working individually and can be independent without much supervision.",
            "I like working in a team and can easily collaborate with others.",
            "I like to apply high creativity in producing a solution or design.",
            "I am very meticulous and always care about small details (detail-oriented).",
            "I can easily and quickly adapt to new environments or technologies.",
            "I am comfortable taking on leadership roles and managing team members.",
            "I prefer working in a structured environment with clear procedures.",
            "I am highly motivated when faced with complex and mind-challenging problems.",
            "I can remain calm and think rationally even when working under high pressure.",
            "I enjoy sharing knowledge, guiding, and teaching others.",
            "I have a high sense of curiosity and always want to learn new things (lifelong learning).",
            "I am a very patient person, especially when needing to solve technical problems (troubleshooting).",
            "I am comfortable taking calculated risks to try new ideas or approaches.",
            "I care deeply about issues of ethics, privacy, and integrity at work.",
            "I am confident and comfortable when communicating with clients or management (stakeholders)."
        ];

        // Function to build question interface dynamically
        const container = document.getElementById('questionsContainer');
        
        personalityQuestions.forEach((q, index) => {
            const qNum = index + 1;
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-card';
            
            let radioButtonsHTML = '';
            for (let i = 1; i <= 5; i++) {
                radioButtonsHTML += `
                    <label class="radio-label">
                        <input type="radio" name="personaliti_${qNum}" value="${i}" required>
                        <span class="radio-custom">${i}</span>
                    </label>
                `;
            }

            questionDiv.innerHTML = `
                <p class="question-text"><strong>${qNum}.</strong> ${q}</p>
                <div class="rating-group">
                    ${radioButtonsHTML}
                </div>
            `;
            
            container.appendChild(questionDiv);
        });

        // Data saving process when form is submitted
        document.getElementById('personalityForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const personalitiData = {};
            
            // Collect all 15 answers
            for(let i = 1; i <= 15; i++) {
                const selectedValue = document.querySelector(`input[name="personaliti_${i}"]:checked`).value;
                personalitiData[`personaliti_${i}`] = parseInt(selectedValue);
            }

            // Save into Local Storage as JSON string
            localStorage.setItem('techpath_personaliti', JSON.stringify(personalitiData));

            // Tunjukkan notifikasi interaktif (Custom Toast) yang ditambah dari page sebelumnya
            const toast = document.getElementById('toastNotification');
            toast.classList.add('show');

            // Tunggu 1.5 saat (1500ms) untuk pengguna baca notifikasi sebelum automatik navigasi
            setTimeout(() => {
                // Navigate to inference engine / processing page
                window.location.href = 'processing.html';
            }, 1500);
        });
    </script>
</body>
</html>
