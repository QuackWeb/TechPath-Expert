<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing Profile... | TechPath Expert</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:    #030712;
            --cyan:  #00f0ff;
            --glow:  rgba(0,240,255,0.55);
            --purple:#8b5cf6;
            --card:  rgba(17,24,39,0.6);
            --text:  #f3f4f6;
            --muted: #9ca3af;
            --mono:  'Share Tech Mono', monospace;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── BACKGROUNDS ── */
        .grid-bg {
            position:fixed; inset:0; z-index:-2;
            background-image:
                linear-gradient(rgba(0,240,255,.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,.022) 1px, transparent 1px);
            background-size:55px 55px;
            animation:gridDrift 30s linear infinite;
        }
        @keyframes gridDrift { to { background-position:55px 55px; } }

        .glow-orb { position:fixed; border-radius:50%; filter:blur(120px); z-index:-1; opacity:.18; pointer-events:none; }
        .orb-1 { width:500px; height:500px; background:var(--cyan);   top:-10%; left:-10%; animation:floatOrb 20s ease-in-out infinite alternate; }
        .orb-2 { width:450px; height:450px; background:var(--purple); bottom:-10%; right:-10%; animation:floatOrb 17s ease-in-out infinite alternate-reverse; }
        @keyframes floatOrb { 0%{transform:translate(0,0);} 100%{transform:translate(30px,-40px);} }

        #particle-canvas { position:fixed; inset:0; z-index:-1; pointer-events:none; }

        .text-cyan { color:var(--cyan); text-shadow:0 0 12px var(--glow); }

        /* ── MAIN LAYOUT ── */
        .main-layout {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding:1.5rem 5%; position:relative; z-index:10;
        }

        /* ── PROCESSING CARD ── */
        .proc-card {
            background:var(--card);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.06);
            border-top:1px solid rgba(255,255,255,.14);
            border-radius:24px;
            padding:2rem 2.5rem;
            width:100%; max-width:680px;
            display:flex; flex-direction:column; align-items:center;
            text-align:center;
            position:relative; overflow:hidden;
            box-shadow:0 25px 55px rgba(0,0,0,.55), 0 0 35px rgba(0,240,255,.07);
            animation:cardIn .7s ease-out both;
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:translateY(0);} }

        /* top gradient bar */
        .proc-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background:linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
        }
        /* slow sweep */
        .proc-card::after {
            content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
            background:linear-gradient(90deg, transparent, rgba(0,240,255,.025), transparent);
            animation:sweep 4s linear infinite;
        }
        @keyframes sweep { to { left:150%; } }

        /* ── ANIMATED RINGS LOADER ── */
        .rings-wrap {
            position:relative; width:110px; height:110px;
            display:flex; align-items:center; justify-content:center;
            margin-bottom:1.4rem;
        }

        .ring {
            position:absolute; border-radius:50%; border:2px solid transparent;
        }
        .ring-1 {
            width:110px; height:110px;
            border-top-color:var(--cyan); border-right-color:rgba(0,240,255,.3);
            animation:spinCW 1.6s linear infinite;
            box-shadow:0 0 18px rgba(0,240,255,.25);
        }
        .ring-2 {
            width:84px; height:84px;
            border-top-color:var(--purple); border-left-color:rgba(139,92,246,.3);
            animation:spinCCW 2s linear infinite;
            box-shadow:0 0 14px rgba(139,92,246,.2);
        }
        .ring-3 {
            width:58px; height:58px;
            border-top-color:rgba(0,240,255,.7); border-bottom-color:rgba(0,240,255,.2);
            animation:spinCW 1.2s linear infinite;
        }
        .ring-core {
            width:32px; height:32px; border-radius:50%;
            background:radial-gradient(circle, rgba(0,240,255,.25) 0%, rgba(0,240,255,.05) 70%);
            border:1px solid rgba(0,240,255,.4);
            box-shadow:0 0 20px rgba(0,240,255,.4), inset 0 0 12px rgba(0,240,255,.15);
            animation:pulsing 1.5s ease-in-out infinite;
        }
        @keyframes spinCW  { to{ transform:rotate(360deg); } }
        @keyframes spinCCW { to{ transform:rotate(-360deg); } }
        @keyframes pulsing { 0%,100%{box-shadow:0 0 20px rgba(0,240,255,.4);} 50%{box-shadow:0 0 35px rgba(0,240,255,.75);} }

        /* ── TITLE ── */
        .proc-title {
            font-size:1.35rem; font-weight:600; color:#fff;
            margin-bottom:.3rem; letter-spacing:.3px;
        }
        .proc-subtitle {
            font-size:.78rem; color:var(--muted);
            margin-bottom:1.4rem; font-family:var(--mono); letter-spacing:.5px;
        }

        /* ── PROGRESS BAR ── */
        .progress-wrap { width:100%; max-width:560px; margin-bottom:1.4rem; }
        .progress-track {
            width:100%; height:4px; background:rgba(255,255,255,.07);
            border-radius:4px; overflow:hidden;
        }
        .progress-fill {
            height:100%; width:0%;
            background:linear-gradient(90deg, var(--cyan), var(--purple));
            border-radius:4px;
            box-shadow:0 0 10px rgba(0,240,255,.5);
            transition:width .5s ease;
        }
        .progress-label {
            display:flex; justify-content:space-between; margin-top:.5rem;
            font-size:.7rem; font-family:var(--mono); color:var(--muted);
        }

        /* ── STAGE INDICATORS ── */
        .stages-row {
            display:flex; align-items:center; gap:0; width:100%;
            max-width:560px; margin-bottom:1.4rem;
        }
        .stage {
            flex:1; display:flex; flex-direction:column; align-items:center; gap:.4rem;
            position:relative;
        }
        .stage:not(:last-child)::after {
            content:''; position:absolute;
            top:14px; left:calc(50% + 14px); right:calc(-50% + 14px);
            height:1px; background:rgba(255,255,255,.1);
            transition:background .5s ease;
        }
        .stage.done:not(:last-child)::after { background:rgba(0,240,255,.4); }

        .stage-dot {
            width:28px; height:28px; border-radius:50%;
            border:1.5px solid rgba(255,255,255,.15);
            background:rgba(0,0,0,.3);
            display:flex; align-items:center; justify-content:center;
            font-size:.65rem; font-family:var(--mono); color:var(--muted);
            transition:all .4s ease; position:relative; z-index:1;
        }
        .stage.active .stage-dot {
            border-color:var(--cyan);
            background:rgba(0,240,255,.1);
            color:var(--cyan);
            box-shadow:0 0 14px rgba(0,240,255,.4);
            animation:pulsing 1.2s ease-in-out infinite;
        }
        .stage.done .stage-dot {
            border-color:rgba(0,240,255,.5);
            background:rgba(0,240,255,.12);
            color:var(--cyan);
            box-shadow:none;
        }
        .stage-label {
            font-size:.62rem; font-family:var(--mono);
            color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
            text-align:center; white-space:nowrap;
        }
        .stage.active .stage-label, .stage.done .stage-label { color:var(--cyan); }

        /* ── TERMINAL ── */
        .terminal-wrap { width:100%; max-width:560px; }
        .terminal-bar {
            display:flex; align-items:center; gap:.5rem;
            background:rgba(0,0,0,.5); border:1px solid rgba(0,240,255,.25);
            border-bottom:none; border-radius:10px 10px 0 0;
            padding:.5rem .9rem;
        }
        .t-dot { width:10px; height:10px; border-radius:50%; }
        .t-dot-r { background:#f87171; }
        .t-dot-y { background:#fbbf24; }
        .t-dot-g { background:#4ade80; }
        .t-label { font-size:.65rem; font-family:var(--mono); color:var(--muted); margin-left:auto; letter-spacing:.5px; }

        .terminal-box {
            background:rgba(2,6,18,.9);
            border:1px solid rgba(0,240,255,.25);
            border-radius:0 0 10px 10px;
            padding:1rem 1.2rem;
            width:100%; height:145px;
            overflow-y:auto; text-align:left;
            font-family:var(--mono); font-size:.82rem;
            color:var(--cyan); position:relative;
        }
        .terminal-box::-webkit-scrollbar { width:4px; }
        .terminal-box::-webkit-scrollbar-track { background:transparent; }
        .terminal-box::-webkit-scrollbar-thumb { background:rgba(0,240,255,.25); border-radius:2px; }

        /* scanline texture */
        .terminal-box::after {
            content:''; position:absolute; inset:0;
            background:repeating-linear-gradient(transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px);
            pointer-events:none;
        }

        .log-line {
            margin:5px 0; opacity:0;
            animation:logIn .35s ease forwards;
            line-height:1.5;
        }
        .log-ok   { color:var(--cyan); }
        .log-run  { color:#fbbf24; }
        .log-done { color:#4ade80; }
        @keyframes logIn { from{opacity:0;transform:translateX(-6px);} to{opacity:1;transform:translateX(0);} }

        /* ── SHORT SCREENS (laptops ~768px height) ── */
        @media (max-height: 800px) {
            .main-layout { padding:1rem 5%; align-items:flex-start; }
            .proc-card { padding:1.5rem 2rem; }
            .rings-wrap { width:90px; height:90px; margin-bottom:1rem; }
            .ring-1 { width:90px; height:90px; }
            .ring-2 { width:68px; height:68px; }
            .ring-3 { width:46px; height:46px; }
            .ring-core { width:26px; height:26px; }
            .proc-title { font-size:1.2rem; }
            .proc-subtitle { margin-bottom:1rem; }
            .progress-wrap { margin-bottom:1rem; }
            .stages-row { margin-bottom:1rem; }
            .terminal-box { height:120px; }
        }

        @media (max-width:640px) {
            .proc-card { padding:1.5rem 1.2rem; }
            .stage-label { font-size:.55rem; }
        }
        @media (max-width:380px) {
            .proc-card { padding:1.2rem .9rem; }
            .proc-title { font-size:1.05rem; }
            .proc-subtitle { font-size:.7rem; }
            .rings-wrap { width:80px; height:80px; margin-bottom:.9rem; }
            .ring-1 { width:80px; height:80px; }
            .ring-2 { width:60px; height:60px; }
            .ring-3 { width:42px; height:42px; }
            .ring-core { width:24px; height:24px; }
            .stage-dot { width:24px; height:24px; font-size:.58rem; }
            .stage-label { font-size:.5rem; }
            .terminal-box { height:110px; padding:.8rem .9rem; font-size:.74rem; }
        }
    </style>
</head>

    <script>
        // ── Particle Canvas ──
        const canvas = document.getElementById('particle-canvas');
        const ctx    = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.6 + .3;
                this.speedX = Math.random() * .7 - .35; this.speedY = Math.random() * .7 - .35;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(0,240,255,.45)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() {
            particles = [];
            const n = (canvas.width * canvas.height) / 14000;
            for (let i = 0; i < n; i++) particles.push(new Particle());
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = p.x - particles[j].x, dy = p.y - particles[j].y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 110) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0,240,255,${.1 - d/1100})`;
                        ctx.lineWidth = .7;
                        ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>

    <script>
        // ── Processing UI ──
        const terminalBox   = document.getElementById('terminalBox');
        const progressFill  = document.getElementById('progressFill');
        const progressPct   = document.getElementById('progressPct');
        const progressStep  = document.getElementById('progressStep');
        const procSubtitle  = document.getElementById('procSubtitle');

        const LOGS = [
            { text: '> Loading user profile from session...          [ OK ]', cls:'log-ok',  pct:14, step:'Loading profile',  stage:1, subtitle:'Loading assessment data...' },
            { text: '> Loading interest profile [15 parameters]...   [ OK ]', cls:'log-ok',  pct:28, step:'Reading interests', stage:1, subtitle:'Reading interest parameters...' },
            { text: '> Loading technical skills assessment...         [ OK ]', cls:'log-ok',  pct:42, step:'Reading skills',   stage:2, subtitle:'Analyzing skills matrix...' },
            { text: '> Processing personality matrix...               [ OK ]', cls:'log-ok',  pct:56, step:'Personality scan',  stage:2, subtitle:'Scanning personality indicators...' },
            { text: '> Running Forward Chaining engine [135 rules]...       ', cls:'log-run', pct:70, step:'Firing rules',     stage:3, subtitle:'Executing inference rules...' },
            { text: '> Calculating weighted career scores...                 ', cls:'log-run', pct:82, step:'Scoring careers',  stage:3, subtitle:'Computing match scores...' },
            { text: '> Extracting top 3 career matches...            [ OK ]', cls:'log-ok',  pct:92, step:'Ranking results',  stage:3, subtitle:'Ranking career recommendations...' },
            { text: '> Analysis complete. Redirecting to results...  [ DONE ]', cls:'log-done',pct:100, step:'Complete',      stage:4, subtitle:'Preparing your results...' },
        ];

        function setStage(n) {
            for (let i = 1; i <= 4; i++) {
                const el = document.getElementById(`stage-${i}`);
                el.classList.remove('active','done');
                if (i < n) el.classList.add('done');
                else if (i === n) el.classList.add('active');
            }
        }

        function addLog(log) {
            const el = document.createElement('div');
            el.className = `log-line ${log.cls}`;
            el.textContent = log.text;
            terminalBox.appendChild(el);
            terminalBox.scrollTop = terminalBox.scrollHeight;
            progressFill.style.width = log.pct + '%';
            progressPct.textContent = log.pct + '%';
            progressStep.textContent = log.step;
            procSubtitle.textContent = log.subtitle;
            setStage(log.stage);
        }

        let idx = 0;
        function tick() {
            if (idx < LOGS.length) {
                addLog(LOGS[idx]);
                idx++;
                setTimeout(tick, 580);
            } else {
                runInferenceEngine();
            }
        }
        setTimeout(tick, 700);

        // ── INFERENCE ENGINE ──
        function runInferenceEngine() {
            const minat      = JSON.parse(localStorage.getItem('techpath_minat'))       || {};
            const kemahiran  = JSON.parse(localStorage.getItem('techpath_kemahiran'))   || {};
            const personaliti= JSON.parse(localStorage.getItem('techpath_personaliti')) || {};
            const profil     = JSON.parse(localStorage.getItem('techpath_userProfile')) || {};

            const careers = {
                "Software Developer":0, "Web Developer":0, "Mobile App Developer":0,
                "Data Analyst":0, "Data Scientist":0, "AI Engineer":0,
                "Machine Learning Engineer":0, "Cybersecurity Analyst":0,
                "Security Engineer":0, "Penetration Tester":0, "Network Engineer":0,
                "Cloud Engineer":0, "System Administrator":0, "DevOps Engineer":0,
                "UI/UX Designer":0, "IT Support Specialist":0,
                "Database Administrator":0, "Business Analyst":0
            };

            // ══════════════════════════════════════════════════════
            // INFERENCE ENGINE — 135 RULES (Forward Chaining)
            // Explanation Facility: setiap rule yang fired direkod dalam
            // `firedRules` supaya result.html boleh terangkan "kenapa"
            // sesuatu career disyorkan.
            // ══════════════════════════════════════════════════════
            const firedRules = {};
            function logFire(career, points, label) {
                if (!firedRules[career]) firedRules[career] = [];
                firedRules[career].push({ points, label });
            }
            function R(career, points, label, cond) {
                if (cond) { careers[career] += points; logFire(career, points, label); }
            }

            // ── RULES 1–18: PRIMARY (+30) — Core Interest + Skill ──
            R("Software Developer",        30, "High interest in programming & strong coding skill",                  minat.minat_1  >= 4 && kemahiran.kemahiran_1  >= 4);
            R("Web Developer",             30, "High interest in web design & strong HTML/CSS/JS skill",              minat.minat_2  >= 4 && kemahiran.kemahiran_2  >= 4);
            R("Mobile App Developer",      30, "High interest in mobile apps & strong coding skill",                  minat.minat_10 >= 4 && kemahiran.kemahiran_1  >= 4);
            R("UI/UX Designer",            30, "Interest in web design & strong UI/UX skill",                         minat.minat_2  >= 4 && kemahiran.kemahiran_9  >= 4);
            R("Data Analyst",              30, "High interest in analyzing data & strong data analysis skill",        minat.minat_3  >= 4 && kemahiran.kemahiran_4  >= 4);
            R("Data Scientist",            30, "Very high interest in data & strong math/statistics skill",           minat.minat_3 >= 5 && kemahiran.kemahiran_3  >= 4);
            R("AI Engineer",               30, "High interest in AI & strong Machine Learning skill",                 minat.minat_5  >= 4 && kemahiran.kemahiran_8  >= 4);
            R("Machine Learning Engineer", 30, "High interest in AI & strong math/statistics skill",                  minat.minat_5  >= 4 && kemahiran.kemahiran_3  >= 4);
            R("Cybersecurity Analyst",     30, "High interest in cybersecurity & strong networking skill",            minat.minat_6  >= 4 && kemahiran.kemahiran_6  >= 4);
            R("Security Engineer",         30, "High interest in security & strong system architecture skill",        minat.minat_6  >= 4 && kemahiran.kemahiran_7  >= 4);
            R("Penetration Tester",        30, "High interest in ethical hacking & strong security skill",            minat.minat_12 >= 4 && kemahiran.kemahiran_6  >= 4);
            R("Network Engineer",          30, "High interest in networking & strong system architecture skill",      minat.minat_7  >= 4 && kemahiran.kemahiran_7  >= 4);
            R("System Administrator",      30, "High interest in maintaining systems & strong server skill",          minat.minat_8  >= 4 && kemahiran.kemahiran_10 >= 4);
            R("Cloud Engineer",            30, "High interest in cloud computing & strong server skill",              minat.minat_13 >= 4 && kemahiran.kemahiran_10 >= 4);
            R("DevOps Engineer",           30, "High interest in system automation & strong server skill",            minat.minat_11 >= 4 && kemahiran.kemahiran_10 >= 4);
            R("IT Support Specialist",     30, "High interest in helping others & strong hardware skill",             minat.minat_15 >= 4 && kemahiran.kemahiran_12 >= 4);
            R("Database Administrator",    30, "High interest in managing databases & strong SQL skill",              minat.minat_9  >= 4 && kemahiran.kemahiran_5  >= 4);
            R("Business Analyst",          30, "High interest in business requirement analysis & strong communication skill", minat.minat_14 >= 4 && kemahiran.kemahiran_14 >= 4);

            // ── RULES 19–36: SUPPORTING (+15) — Skill + Personality ──
            R("Software Developer",        15, "Interest in solving logical problems & personality that enjoys complex challenges", minat.minat_4 >= 4 && personaliti.personaliti_8 >= 4);
