<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Explorer | TechPath Expert</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Page-specific aliases for local CSS */
            --primary-cyan:  #00f0ff;
            --primary-glow:  rgba(0,240,255,0.6);
            --card-bg:       rgba(17,24,39,0.65);
            --text-main:     #f3f4f6;
            --text-muted:    #9ca3af;
            --border-subtle: rgba(255,255,255,0.07);
            --border-cyan:   rgba(0,240,255,0.25);
            --mono:          'Courier New', Courier, monospace;
        }

        /* ── HEADER — explicit so it matches all other pages exactly ── */
        .header-container {
            position: sticky; top: 0; z-index: 200;
            background: rgba(3,7,18,.85);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(0,240,255,.12);
            width: 100%;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.3rem 5%; max-width: 1300px; min-height: 70px; margin: 0 auto;
        }
        .logo h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; margin: 0; color: var(--text-main); }
        .text-cyan { color: var(--primary-cyan); text-shadow: 0 0 12px var(--primary-glow); }
        .nav-links { list-style: none; display: flex; gap: 2rem; }
        .nav-links a {
            text-decoration: none; color: var(--text-main); font-weight: 400;
            font-size: 0.95rem; position: relative; transition: .3s;
        }
        .nav-links a::after {
            content: ''; position: absolute; width: 0; height: 2px;
            bottom: -4px; left: 0; background: var(--primary-cyan); transition: width .3s;
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-cyan); text-shadow: 0 0 8px var(--primary-glow); }

        /* cursor glow — page specific */
        .cursor-glow { width:300px; height:300px; background:radial-gradient(circle,rgba(0,240,255,.05) 0%,transparent 70%); border-radius:50%; position:fixed; pointer-events:none; transform:translate(-50%,-50%); z-index:0; transition:left .12s ease,top .12s ease; }

        /* LAYOUT */
        .page-wrapper { max-width:1300px; margin:0 auto; padding:2.5rem 5% 5rem; position:relative; z-index:10; }

        /* HERO */
        .page-hero { text-align:center; margin-bottom:3rem; padding-top:1rem; }
        .page-hero h2 { font-size:2.8rem; font-weight:700; margin-bottom:0.7rem; letter-spacing:-.5px; }
        .page-hero h2 span {
            background:linear-gradient(135deg, var(--primary-cyan) 0%, var(--purple) 60%, var(--primary-cyan) 100%);
            background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            animation:gradFlow 4s linear infinite;
        }
        @keyframes gradFlow { 0% { background-position:0% center; } 100% { background-position:200% center; } }
        .page-hero p { color:var(--text-muted); font-size:1.05rem; max-width:580px; margin:0 auto 1.2rem; line-height:1.7; }
        .career-count-badge {
            display:inline-flex; align-items:center; gap:0.6rem; padding:0.45rem 1.2rem;
            background:rgba(0,240,255,0.06); border:1px solid var(--border-cyan); border-radius:50px;
            font-size:0.8rem; color:var(--primary-cyan); letter-spacing:.5px; text-transform:uppercase; font-weight:600;
        }
        .badge-pulse { width:6px; height:6px; background:var(--primary-cyan); border-radius:50%; box-shadow:0 0 6px var(--primary-cyan); animation:bpulse 1.5s infinite; }
        @keyframes bpulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,240,255,.7);} 70%{box-shadow:0 0 0 6px rgba(0,240,255,0);} }

        /* SEARCH */
        .search-wrapper { position:relative; max-width:580px; margin:0 auto 2rem; }
        .search-icon { position:absolute; left:1.1rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.78rem; font-weight:700; letter-spacing:1px; font-family:var(--mono); pointer-events:none; }
        #searchInput { width:100%; padding:0.9rem 1rem 0.9rem 3.5rem; background:rgba(17,24,39,0.8); border:1px solid var(--border-cyan); border-radius:12px; color:var(--text-main); font-family:'Poppins',sans-serif; font-size:0.95rem; transition:all 0.3s; outline:none; }
        #searchInput::placeholder { color:var(--text-muted); }
        #searchInput:focus { border-color:var(--primary-cyan); box-shadow:0 0 0 3px rgba(0,240,255,0.1),0 0 20px rgba(0,240,255,0.12); background:rgba(0,240,255,0.03); }

        /* FILTER BAR */
        .filter-bar { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; justify-content:center; margin-bottom:2rem; }
        .filter-btn { display:inline-flex; align-items:center; gap:0.4rem; padding:0.45rem 1rem; background:rgba(17,24,39,0.6); border:1px solid var(--border-subtle); border-radius:6px; color:var(--text-muted); font-family:'Poppins',sans-serif; font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.25s; white-space:nowrap; text-transform:uppercase; letter-spacing:.5px; touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none; }
        .filter-btn:hover { border-color:var(--border-cyan); color:var(--primary-cyan); background:rgba(0,240,255,0.05); }
        .filter-btn.active { background:rgba(0,240,255,0.1); border-color:var(--primary-cyan); color:var(--primary-cyan); box-shadow:0 0 14px rgba(0,240,255,0.15); }
        .filter-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

        /* RESULTS BAR */
        .results-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; font-size:0.875rem; color:var(--text-muted); }
        .results-bar strong { color:var(--text-main); }

        /* GRID */
        .career-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; }

        /* CARD */
        .career-card {
            background:var(--card-bg); backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,.06);
            border-radius:22px;
            padding:1.6rem; display:flex; flex-direction:column; gap:.9rem;
            position:relative; overflow:hidden;
            transition:all .32s ease;
            animation:cardIn .4s ease-out forwards; opacity:0; transform:translateY(14px);
        }
        @keyframes cardIn { to { opacity:1; transform:translateY(0); } }
        .career-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background:linear-gradient(90deg,transparent,var(--primary-cyan),transparent);
            opacity:0; transition:opacity .32s;
        }
        .career-card:hover { transform:translateY(-6px); border-color:rgba(0,240,255,.22); box-shadow:0 18px 38px rgba(0,0,0,.5), 0 0 22px rgba(0,240,255,.1); }
        .career-card:hover::before { opacity:1; }

        /* badges */
        .card-badges { display:flex; gap:.4rem; flex-wrap:wrap; min-height:20px; }
        .badge { display:inline-flex; align-items:center; padding:.15rem .65rem; border-radius:50px; font-size:.62rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
        .badge-trending  { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.25);  color:#f87171; }
        .badge-beginner  { background:rgba(34,197,94,.1);  border:1px solid rgba(34,197,94,.25);  color:#4ade80; }
        .badge-highsalary{ background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.25); color:#c084fc; }

        /* content */
        .card-category { display:inline-flex; align-items:center; gap:.4rem; font-size:.67rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.7px; font-weight:600; }
        .cat-tag { padding:.16rem .6rem; border-radius:50px; font-size:.6rem; font-weight:700; letter-spacing:.4px; }
        .card-title { font-size:1.08rem; font-weight:600; color:var(--text-main); transition:color .25s; line-height:1.3; }
        .career-card:hover .card-title { color:var(--primary-cyan); text-shadow:0 0 10px rgba(0,240,255,.25); }
        .card-desc { font-size:.835rem; color:var(--text-muted); line-height:1.7; flex-grow:1; }

        .skill-tags { display:flex; flex-wrap:wrap; gap:.3rem; }
        .skill-tag  { padding:.14rem .55rem; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:50px; font-size:.67rem; color:var(--text-muted); transition:all .2s; }
        .career-card:hover .skill-tag { border-color:rgba(0,240,255,.16); color:var(--text-main); }

        /* demand */
        .card-demand { display:flex; align-items:center; justify-content:space-between; font-size:.78rem; }
        .demand-label { color:var(--text-muted); }
        .demand-right { display:flex; align-items:center; gap:.4rem; }
        .demand-dots  { display:flex; gap:3px; }
        .demand-dot   { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.12); }
        .demand-dot.filled { background:var(--primary-cyan); box-shadow:0 0 5px rgba(0,240,255,.5); }
        .demand-text  { color:var(--primary-cyan); font-weight:600; font-size:.76rem; }

        /* explore button */
        .explore-btn { display:flex; align-items:center; justify-content:center; gap:.45rem; width:100%; padding:.6rem; background:transparent; border:1px solid rgba(0,240,255,.22); border-radius:50px; color:var(--primary-cyan); font-family:'Poppins',sans-serif; font-size:.78rem; font-weight:600; cursor:pointer; transition:all .28s; margin-top:auto; }
        .explore-btn:hover { background:rgba(0,240,255,.1); box-shadow:0 0 16px rgba(0,240,255,.18); }
        .explore-btn .btn-arrow { transition:transform .28s; }
        .explore-btn:hover .btn-arrow { transform:translateX(4px); }

        /* empty state */
        .empty-state { grid-column:1/-1; text-align:center; padding:4rem 2rem; color:var(--text-muted); }
        .empty-state .empty-icon { width:60px; height:60px; border:1px solid var(--border-cyan); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.2rem; font-size:.75rem; font-weight:700; color:var(--primary-cyan); font-family:var(--mono); }
        .empty-state h3 { font-size:1.2rem; color:var(--text-main); margin-bottom:.5rem; }

        /* ===== MODAL ===== */
        .modal-overlay { position:fixed; inset:0; z-index:2000; background:rgba(3,7,18,0.9); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; padding:1.5rem; opacity:0; visibility:hidden; transition:opacity 0.3s,visibility 0.3s; }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-container { background:rgba(8,13,28,0.98); border:1px solid var(--border-cyan); border-radius:20px; max-width:880px; width:100%; max-height:92vh; overflow-y:auto; padding:2.5rem; position:relative; transform:scale(0.93) translateY(18px); transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 30px 70px rgba(0,0,0,0.8),0 0 40px rgba(0,240,255,0.07); }
        .modal-overlay.active .modal-container { transform:scale(1) translateY(0); }
        .modal-container::-webkit-scrollbar { width:4px; }
        .modal-container::-webkit-scrollbar-track { background:transparent; }
        .modal-container::-webkit-scrollbar-thumb { background:var(--border-cyan); border-radius:4px; }
        .modal-close { position:absolute; top:1.2rem; right:1.2rem; width:32px; height:32px; background:rgba(255,255,255,0.06); border:1px solid var(--border-subtle); border-radius:8px; color:var(--text-muted); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .modal-close:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.4); color:#f87171; }

        /* Modal header */
        .modal-header { margin-bottom:1.8rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border-subtle); }
        .modal-title { font-size:1.9rem; font-weight:700; margin-bottom:0.85rem; }
        .modal-meta { display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
        .modal-meta-item { display:flex; align-items:center; gap:0.45rem; font-size:0.855rem; color:var(--text-muted); }
        .modal-meta-item strong { color:var(--text-main); }
        .diff-bar { display:flex; gap:3px; }
        .diff-seg { width:26px; height:4px; border-radius:3px; background:rgba(255,255,255,0.1); }
        .diff-seg.d-beginner { background:#4ade80; }
        .diff-seg.d-intermediate { background:#fb923c; }
        .diff-seg.d-advanced { background:#f87171; }
        .diff-badge { padding:0.3rem 0.8rem; border-radius:8px; font-size:0.8rem; font-weight:600; }
        .diff-badge.b { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:#4ade80; }
        .diff-badge.i { background:rgba(251,146,60,0.12); border:1px solid rgba(251,146,60,0.3); color:#fb923c; }
        .diff-badge.a { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:#f87171; }

        /* Modal body */
        .modal-full-desc { font-size:0.93rem; color:var(--text-muted); line-height:1.9; margin-bottom:1.8rem; }
        .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.1rem; margin-bottom:1.1rem; }
        .modal-section { background:rgba(0,0,0,0.22); border:1px solid var(--border-subtle); border-radius:12px; padding:1.3rem; }
        .modal-section.full { grid-column:1/-1; }
        .modal-sec-title { font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--primary-cyan); margin-bottom:0.9rem; }
        .modal-list { list-style:none; display:flex; flex-direction:column; gap:0.5rem; }
        .modal-list li { font-size:0.855rem; color:var(--text-muted); display:flex; align-items:flex-start; gap:0.5rem; line-height:1.6; }
        .modal-list li::before { content:'▹'; color:var(--primary-cyan); flex-shrink:0; margin-top:0.05rem; }
        .modal-tags { display:flex; flex-wrap:wrap; gap:0.45rem; }
        .modal-tag-cyan   { padding:0.28rem 0.75rem; background:rgba(0,240,255,0.07);   border:1px solid rgba(0,240,255,0.2);   border-radius:8px; font-size:0.78rem; color:var(--primary-cyan); }
        .modal-tag-purple { padding:0.28rem 0.75rem; background:rgba(168,85,247,0.07); border:1px solid rgba(168,85,247,0.2); border-radius:8px; font-size:0.78rem; color:#c084fc; }
        .salary-pair { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
        .salary-box { background:rgba(0,240,255,0.04); border:1px solid rgba(0,240,255,0.13); border-radius:10px; padding:1rem; text-align:center; }
        .salary-label { font-size:0.72rem; color:var(--text-muted); margin-bottom:0.3rem; text-transform:uppercase; letter-spacing:0.5px; }
        .salary-value { font-size:0.98rem; font-weight:600; color:#a7f3d0; }
        .prog-flow { display:flex; align-items:center; flex-wrap:wrap; gap:0.4rem; }
        .prog-step { padding:0.32rem 0.7rem; background:rgba(0,240,255,0.06); border:1px solid var(--border-cyan); border-radius:8px; font-size:0.76rem; color:var(--text-main); white-space:nowrap; }
        .prog-arrow { color:var(--primary-cyan); font-size:0.85rem; }

        /* ===== ROLE BADGES ===== */
        .role-badges-row { display:flex; flex-wrap:wrap; gap:0.45rem; margin-bottom:1rem; }
        .role-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.28rem 0.75rem; border-radius:8px; font-size:0.75rem; font-weight:600; }
        .rb-beginner    { background:rgba(34,197,94,0.1);  border:1px solid rgba(34,197,94,0.25);  color:#4ade80; }
        .rb-careergrowth{ background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.25); color:#60a5fa; }
        .rb-highdemand  { background:rgba(239,68,68,0.1);  border:1px solid rgba(239,68,68,0.25);  color:#f87171; }
        .rb-entrypoint  { background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25); color:#fbbf24; }
        .rb-specialist  { background:rgba(251,146,60,0.1); border:1px solid rgba(251,146,60,0.25); color:#fb923c; }
        .rb-leadership  { background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.25); color:#c084fc; }

        /* ===== MODAL DIVIDER + SECTION HEADING ===== */
        .modal-divider { height:1px; background:rgba(255,255,255,0.07); margin:2rem 0; }
        .modal-sh { font-size:.72rem; font-weight:700; color:var(--primary-cyan); margin-bottom:1.2rem; padding-bottom:0.6rem; border-bottom:1px solid rgba(0,240,255,0.12); letter-spacing:1.2px; text-transform:uppercase; display:flex; align-items:center; gap:.6rem; }
        .modal-sh::before { content:''; display:inline-block; width:3px; height:14px; background:var(--primary-cyan); border-radius:2px; flex-shrink:0; }

        /* ===== SIMILAR CAREERS ===== */
        .similar-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:0.9rem; }
        .similar-card { background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:1.2rem; cursor:pointer; transition:all 0.25s; display:flex; flex-direction:column; }
        .similar-card:hover { border-color:var(--border-cyan); background:rgba(0,240,255,0.04); transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.4); }
        .s-icon  { font-size:1.6rem; margin-bottom:0.5rem; }
        .s-name  { font-size:0.95rem; font-weight:600; color:var(--text-main); margin-bottom:0.2rem; transition:color 0.2s; }
        .similar-card:hover .s-name { color:var(--primary-cyan); }
        .s-cat   { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.6rem; }
        .s-desc  { font-size:0.8rem; color:var(--text-muted); line-height:1.5; flex-grow:1; margin-bottom:0.9rem; }
        .s-btn   { display:inline-flex; align-items:center; gap:0.35rem; font-size:0.8rem; color:var(--primary-cyan); background:none; border:1px solid rgba(0,240,255,0.2); border-radius:7px; padding:0.32rem 0.7rem; cursor:pointer; font-family:'Poppins',sans-serif; transition:all 0.2s; }
        .s-btn:hover { background:rgba(0,240,255,0.08); }

        /* ===== HOW IS THIS DIFFERENT ===== */
        .diff-block { background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:1.3rem; margin-bottom:1rem; }
        .diff-block:last-child { margin-bottom:0; }
        .diff-vs-header { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.7rem; flex-wrap:wrap; }
        .diff-this-pill  { padding:0.22rem 0.75rem; background:rgba(0,240,255,0.09);   border:1px solid rgba(0,240,255,0.3);   border-radius:6px; font-size:0.78rem; font-weight:600; color:var(--primary-cyan); }
        .diff-other-pill { padding:0.22rem 0.75rem; background:rgba(168,85,247,0.09); border:1px solid rgba(168,85,247,0.3); border-radius:6px; font-size:0.78rem; font-weight:600; color:#c084fc; }
        .diff-vs-txt { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
        .diff-intro-txt { font-size:0.855rem; color:var(--text-muted); margin-bottom:1rem; font-style:italic; line-height:1.65; }
        .diff-cols { display:grid; grid-template-columns:1fr 1fr; gap:0.9rem; }
        .diff-col-box { background:rgba(0,0,0,0.15); border-radius:8px; padding:0.9rem; }
        .diff-col-lbl { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:0.22rem 0.6rem; border-radius:6px; margin-bottom:0.75rem; display:inline-block; }
        .diff-col-lbl.is-this  { background:rgba(0,240,255,0.08); color:var(--primary-cyan); border:1px solid rgba(0,240,255,0.2); }
        .diff-col-lbl.is-other { background:rgba(168,85,247,0.08); color:#c084fc; border:1px solid rgba(168,85,247,0.2); }
        .diff-col-box ul { list-style:none; display:flex; flex-direction:column; gap:0.45rem; }
        .diff-col-box li { font-size:0.8rem; color:var(--text-muted); display:flex; align-items:flex-start; gap:0.45rem; line-height:1.55; }
        .diff-col-box.is-this  li::before { content:'✓'; color:var(--primary-cyan); flex-shrink:0; font-size:0.75rem; margin-top:0.08rem; }
        .diff-col-box.is-other li::before { content:'◈'; color:#c084fc;             flex-shrink:0; font-size:0.75rem; margin-top:0.08rem; }

        /* RESPONSIVE */
        @media (max-width:1024px) { .career-grid { grid-template-columns:repeat(2,1fr); } }
        @media (max-width:768px) {
            .nav-links { display:none; }
            .navbar { flex-direction:row; padding:1rem 5%; min-height:60px; }
            .page-hero h2 { font-size:2rem; }
            /* Filter bar wraps on mobile — semua buttons visible tanpa scroll */
            .filter-bar {
                flex-wrap: wrap !important;
                overflow-x: visible !important;
                justify-content: center !important;
                gap: 0.4rem !important;
            }
            .filter-btn {
                min-height: 40px;
                font-size: 0.75rem;
                padding: 0.4rem 0.85rem;
            }
            /* Modal full-screen on mobile */
            .modal-overlay { padding: 0; align-items: flex-end; }
            .modal-container {
                border-radius: 20px 20px 0 0;
                max-height: 92vh;
                padding: 1.5rem 1.2rem;
            }
            .career-grid { grid-template-columns:1fr; }
            .modal-grid { grid-template-columns:1fr; }
            .diff-cols { grid-template-columns:1fr; }

let activeFilter = 'all';
let searchTerm   = '';

function getDemandDots(level) {
    let h = '';
    for (let i = 1; i <= 5; i++) h += `<span class="demand-dot ${i <= level ? 'filled' : ''}"></span>`;
    return h;
}

function getCardBadgeHTML(b) {
    const map = { trending:'Trending', beginner:'Beginner Friendly', highsalary:'High Salary' };
    const cls = { trending:'badge-trending', beginner:'badge-beginner', highsalary:'badge-highsalary' };
    return `<span class="badge ${cls[b]}">${map[b]}</span>`;
}

function getRoleBadgesHTML(arr) {
    return arr.map(k => {
        const rb = ROLE_BADGE_MAP[k];
        return rb ? `<span class="role-badge ${rb.cls}">${rb.label}</span>` : '';
    }).join('');
}

    const count = diff==='Beginner'?1:diff==='Intermediate'?2:3;
    const cls   = diff==='Beginner'?'d-beginner':diff==='Intermediate'?'d-intermediate':'d-advanced';
    let h = '';
    for (let i = 0; i < 3; i++) h += `<span class="diff-seg ${i < count ? cls : ''}"></span>`;
    return h;
}

function getDiffBadgeClass(diff) {
    return diff==='Beginner'?'b':diff==='Intermediate'?'i':'a';
}

// ─────────────────────────────────────────────
// RENDER GRID
// ─────────────────────────────────────────────
function renderGrid(data) {
    const grid = document.getElementById('careerGrid');
    document.getElementById('showingCount').textContent = data.length;

    if (!data.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">404</div><h3>No careers found</h3><p>Try a different keyword or clear the active filter.</p></div>`;
        return;
    }

    grid.innerHTML = data.map((c, i) => {
        const vis   = c.skills.slice(0, 4);
        const extra = c.skills.length - 4;
        const tags  = vis.map(s => `<span class="skill-tag">${s}</span>`).join('') +
                      (extra > 0 ? `<span class="skill-tag">+${extra}</span>` : '');

        return `
        <div class="career-card" style="animation-delay:${i * 0.04}s">
            <div class="card-badges">${c.badges.map(getCardBadgeHTML).join('')}</div>
            <div>
                <div class="card-category">${getCatTag(c.category)} ${c.category}</div>
                <div class="card-title">${c.name}</div>
            </div>
            <div class="card-desc">${c.desc}</div>
            <div class="skill-tags">${tags}</div>
            <div class="card-demand">
                <span class="demand-label">Market Demand</span>
                <div class="demand-right">
                    <div class="demand-dots">${getDemandDots(c.demandLevel)}</div>
                    <span class="demand-text">${c.demand}</span>
                </div>
            </div>
            <button class="explore-btn" onclick="openModal('${c.name.replace(/'/g,"\\'")}')">
                Explore Career <span class="btn-arrow">→</span>
            </button>
        </div>`;
    }).join('');
}

function getFiltered() {
    return careers.filter(c => {
        const matchCat  = activeFilter === 'all' || c.category === activeFilter;
        const term      = searchTerm.toLowerCase();
        const matchSrch = !term ||
            c.name.toLowerCase().includes(term) ||
            c.desc.toLowerCase().includes(term) ||
            c.skills.some(s => s.toLowerCase().includes(term)) ||
            c.category.toLowerCase().includes(term);
        return matchCat && matchSrch;
    });
}

function refresh() {
    renderGrid(getFiltered());
    const lbl = document.getElementById('activeFilterLabel');
    lbl.textContent = activeFilter !== 'all' ? `Filtered: ${activeFilter}` : '';
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(name) {
    const c = careers.find(x => x.name === name);
    if (!c) return;

    // Progression steps
    const progSteps = c.progression.split(' → ');
    const progHTML  = progSteps.map((s, i) =>
        `<span class="prog-step">${s}</span>${i < progSteps.length-1 ? '<span class="prog-arrow">→</span>' : ''}`
    ).join('');

    // Similar career mini-cards
    const simCardsHTML = c.similar.map(sName => {
        const sc = careers.find(x => x.name === sName);
        if (!sc) return '';
        const safeN = sName.replace(/'/g, "\\'");
        const cs = CAT_STYLE[sc.category] || { tag:'IT', color:'#9ca3af' };
        return `
        <div class="similar-card" onclick="openModal('${safeN}')">
            <div class="s-icon" style="font-size:.65rem;font-weight:700;letter-spacing:.5px;padding:.4rem .7rem;background:${cs.color}15;border:1px solid ${cs.color}33;border-radius:8px;color:${cs.color};margin-bottom:.6rem;display:inline-block">${cs.tag}</div>
            <div class="s-name">${sc.name}</div>
            <div class="s-cat">${sc.category}</div>
            <p class="s-desc">${sc.desc}</p>
            <button class="s-btn">Explore Career →</button>
        </div>`;
    }).join('');

    // How Is This Different blocks
    const diffHTML = c.similar.map(sName => {
        const d  = c.differences[sName];
        const sc = careers.find(x => x.name === sName);
        if (!d || !sc) return '';
        return `
        <div class="diff-block">
            <div class="diff-vs-header">
                <span class="diff-this-pill">${c.name}</span>
                <span class="diff-vs-txt">vs</span>
                <span class="diff-other-pill">${sName}</span>
            </div>
            <p class="diff-intro-txt">${d.intro}</p>
            <div class="diff-cols">
                <div class="diff-col-box is-this">
                    <span class="diff-col-lbl is-this">${c.name}</span>
                    <ul>${d.thisCareer.map(p => `<li>${p}</li>`).join('')}</ul>
                </div>
                <div class="diff-col-box is-other">
                    <span class="diff-col-lbl is-other">${sName}</span>
                    <ul>${d.otherCareer.map(p => `<li>${p}</li>`).join('')}</ul>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('modalContent').innerHTML = `
        <div class="modal-header">
            <div class="modal-title">${c.name}</div>
            <div class="role-badges-row">${getRoleBadgesHTML(c.roleBadges)}</div>
            <div class="modal-meta">
                <div class="modal-meta-item">${getCatTag(c.category)} <strong>${c.category}</strong></div>
                <div class="modal-meta-item">
                    <span class="diff-badge ${getDiffBadgeClass(c.difficulty)}">${c.difficulty}</span>
                    <div class="diff-bar">${getDiffSegments(c.difficulty)}</div>
                </div>
                <div class="modal-meta-item">
                    <div class="demand-dots">${getDemandDots(c.demandLevel)}</div>
                    <strong>${c.demand}</strong>&nbsp;Demand
                </div>
            </div>
        </div>

        <p class="modal-full-desc">${c.fullDesc}</p>

        <div class="modal-grid">
            <div class="modal-section">
                <div class="modal-sec-title">Main Responsibilities</div>
                <ul class="modal-list">${c.responsibilities.map(r=>`<li>${r}</li>`).join('')}</ul>
            </div>
            <div class="modal-section">
                <div class="modal-sec-title">Technical Skills</div>
                <div class="modal-tags">${c.skills.map(s=>`<span class="modal-tag-cyan">${s}</span>`).join('')}</div>
                <div class="modal-sec-title" style="margin-top:1rem;">Soft Skills</div>
                <div class="modal-tags">${c.softSkills.map(s=>`<span class="modal-tag-purple">${s}</span>`).join('')}</div>
            </div>
            <div class="modal-section">
                <div class="modal-sec-title">Recommended Certifications</div>
                <ul class="modal-list">${c.certs.map(x=>`<li>${x}</li>`).join('')}</ul>
            </div>
            <div class="modal-section">
                <div class="modal-sec-title">Learning Resources</div>
                <ul class="modal-list">${c.courses.map(x=>`<li>${x}</li>`).join('')}</ul>
            </div>
            <div class="modal-section full">
                <div class="modal-sec-title">Salary Range — Malaysia</div>
                <div class="salary-pair">
                    <div class="salary-box"><div class="salary-label">Junior / Entry Level</div><div class="salary-value">${c.junior}</div></div>
                    <div class="salary-box"><div class="salary-label">Senior / Expert Level</div><div class="salary-value">${c.senior}</div></div>
                </div>
            </div>
            <div class="modal-section full">
                <div class="modal-sec-title">Career Progression Pathway</div>
                <div class="prog-flow">${progHTML}</div>
            </div>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-sh">Similar Careers</div>
        <p style="font-size:0.855rem;color:var(--text-muted);margin-bottom:1.2rem;">People who explore <strong style="color:var(--text-main);">${c.name}</strong> often also consider these roles. Click to compare.</p>
        <div class="similar-grid">${simCardsHTML}</div>

        <div class="modal-divider"></div>

        <div class="modal-sh">How Is This Different?</div>
        <p style="font-size:0.855rem;color:var(--text-muted);margin-bottom:1.2rem;">Side-by-side breakdown so you can clearly tell these similar-looking careers apart.</p>
        ${diffHTML}
    `;

    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('modalContainer').scrollTop = 0;
    document.getElementById('modalClose').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('modalClose').style.display = 'none';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────
// FILTER + SEARCH
// ─────────────────────────────────────────────
function setFilter(btn, filterVal) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = filterVal;
    refresh();
}

// Fallback event delegation (backup)
document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    setFilter(btn, btn.dataset.filter);
});

document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    refresh();
});

refresh();

// Auto-open career modal from URL parameter (passed from result.html)
(function() {
    const params = new URLSearchParams(window.location.search);
    const target = params.get('career');
    if (target) {
        setTimeout(() => openModal(decodeURIComponent(target)), 200);
    }
})();
</script>

<script src="script.js"></script>

<script>
// Cursor glow
const cgEl = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => { cgEl.style.left = e.clientX+'px'; cgEl.style.top = e.clientY+'px'; });

const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
        if (this.y > canvas.height) this.y = 0;
        if (this.y < 0) this.y = canvas.height;
    }
    draw() {
        ctx.fillStyle = 'rgba(0,240,255,0.5)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}
function init() {
    particles = [];
    const n = (canvas.width * canvas.height) / 15000;
    for (let i = 0; i < n; i++) particles.push(new Particle());
}
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.update(); p.draw();
        for (let j = i + 1; j < particles.length; j++) {
            const dx = p.x - particles[j].x, dy = p.y - particles[j].y;
            const d  = Math.sqrt(dx*dx + dy*dy);
            if (d < 120) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0,240,255,${0.15 - d/800})`;
                ctx.lineWidth = 1;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    });
    requestAnimationFrame(animate);
}
init(); animate();
</script>
